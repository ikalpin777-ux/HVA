<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  #hva-root {
    --blue: #0050AA;
    --blue-dark: #003D82;
    --blue-tint: #EAF1FB;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --border: #E1E5EB;
    --text: #1A1F29;
    --text-soft: #667085;
    --danger: #D1453B;
    --danger-tint: #FCECEA;
    --success: #1D8A5E;
    --warn: #B54708;
    --warn-tint: #FEF3E7;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    border-radius: 14px;
    padding: 24px;
    box-sizing: border-box;
  }
  #hva-root *, .hva-modal-backdrop * { box-sizing: border-box; font-family: inherit; }
  .hva-mono { font-family: 'DM Mono', ui-monospace, Menlo, monospace; }

  .hva-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
  .hva-title { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .hva-subtitle { font-size: 12.5px; color: var(--text-soft); margin-top: 2px; }
  .hva-stats { display:flex; gap:16px; font-size:12px; color:var(--text-soft); text-align:right; flex-wrap:wrap; }
  .hva-stat b { display:block; font-size:16px; color:var(--text); font-weight:700; }

  .hva-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .hva-form-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; align-items: flex-end; }
  .hva-field { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
  .hva-field label { font-size: 11px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.04em; white-space:nowrap; }
  .hva-field .req { color: var(--danger); }
  .hva-input {
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font-size: 13px; color: var(--text); background: #FCFCFD; outline: none; width: 100%;
  }
  .hva-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-tint); background: #fff; }
  .hva-input.err { border-color: var(--danger); background: var(--danger-tint); }
  .hva-field-error { font-size: 10.5px; color: var(--danger); font-weight: 600; display:none; }
  .hva-field-error.show { display:block; }

  .hva-btn {
    display:inline-flex; align-items:center; gap:6px; border: none; border-radius: 8px; padding: 9px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; background:#fff;
  }
  .hva-btn-primary { background: var(--blue); color: #fff; }
  .hva-btn-primary:hover { background: var(--blue-dark); }
  .hva-btn-secondary { background: #fff; color: var(--blue); border: 1px solid var(--border); }
  .hva-btn-secondary:hover:not(:disabled) { border-color: var(--blue); }
  .hva-btn-secondary:disabled { color: #B7BEC9; cursor: not-allowed; }
  .hva-btn-danger { background: var(--danger); color:#fff; }
  .hva-btn-danger-soft { background: var(--danger-tint); color: var(--danger); border:1px solid transparent; }
  .hva-btn-danger-soft:hover { border-color: var(--danger); }
  .hva-btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 7px; }
  .hva-icon-btn { background:transparent; border:none; cursor:pointer; color:var(--text-soft); padding:4px 6px; border-radius:6px; font-size:13px; }
  .hva-icon-btn:hover { background: var(--blue-tint); color: var(--blue-dark); }
  .hva-icon-btn.danger:hover { background: var(--danger-tint); color: var(--danger); }
  .hva-action-link {
    background:none; border:none; cursor:pointer; font-size:12px; font-weight:600;
    color: var(--blue); padding: 3px 6px; border-radius:5px;
  }
  .hva-action-link:hover { background: var(--blue-tint); }
  .hva-action-link.danger { color: var(--danger); }
  .hva-action-link.danger:hover { background: var(--danger-tint); }

  .hva-toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .hva-search { position:relative; flex: 1 1 240px; min-width: 200px; }
  .hva-search input { padding-left: 30px; background:#fff; }
  .hva-search .icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color: var(--text-soft); font-size: 13px; }
  .hva-search .clear-x { position:absolute; right:6px; top:50%; transform:translateY(-50%); display:none; }
  .hva-search.has-q .clear-x { display:inline-flex; }
  .hva-select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; background: #fff; color: var(--text); outline: none; cursor: pointer; }

  .hva-menu-wrap { position: relative; }
  .hva-menu {
    position:absolute; top: calc(100% + 4px); right:0; background:#fff; border:1px solid var(--border);
    border-radius:10px; box-shadow: 0 8px 24px rgba(16,24,40,.12); min-width: 210px; z-index: 30; display:none; overflow:hidden;
  }
  .hva-menu.open { display:block; }
  .hva-menu button { display:block; width:100%; text-align:left; background:none; border:none; padding:10px 14px; font-size:13px; cursor:pointer; color:var(--text); }
  .hva-menu button:hover { background: var(--blue-tint); }
  .hva-menu .menu-label { padding:8px 14px 4px; font-size:10.5px; font-weight:700; color:var(--text-soft); text-transform:uppercase; letter-spacing:.05em; }
  .hva-menu hr { border:none; border-top:1px solid var(--border); margin:4px 0; }
  .hva-menu button.danger { color: var(--danger); }
  .hva-menu button.danger:hover { background: var(--danger-tint); }

  .hva-bulkbar {
    display:none; align-items:center; gap:10px; background: var(--blue-tint); border:1px solid #C7DBF5;
    border-radius:10px; padding:8px 12px; margin-bottom:10px; font-size:13px; color:var(--blue-dark); flex-wrap:wrap;
  }
  .hva-bulkbar.show { display:flex; }
  .hva-bulkbar b { font-weight:700; }
  .hva-bulkbar .spacer { flex:1; }

  .hva-table-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: auto; max-height: 480px; background: var(--card); }
  table.hva-table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  table.hva-table thead th {
    position: sticky; top: 0; background: var(--blue-tint); color: var(--blue-dark); text-align: left;
    padding: 9px 10px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em;
    white-space: nowrap; border-bottom: 1px solid var(--border); z-index: 1; user-select:none;
  }
  table.hva-table thead th.sortable { cursor: pointer; }
  table.hva-table thead th.sortable:hover { background:#DCE9F9; }
  table.hva-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  table.hva-table tbody tr { cursor: pointer; }
  table.hva-table tbody tr:hover { background: #FAFBFC; }
  table.hva-table tbody tr.is-selected { background: var(--blue-tint); }
  .hva-checkbox-cell { cursor: pointer; color: var(--text-soft); text-align:center; font-size:14px; }
  .hva-checkbox-cell:hover { color: var(--blue); }
  .hva-cat-pill { display:inline-block; background: var(--blue-tint); color: var(--blue-dark); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .hva-actions-cell { white-space:nowrap; }
  mark { background: #FFE58F; color: inherit; padding: 0 1px; border-radius: 2px; }
  .hva-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding: 48px 20px; color: var(--text-soft); font-size: 13px; text-align:center; }

  .hva-toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 9px 14px; border-radius: 8px; font-size: 12.5px;
    font-weight: 500; box-shadow: 0 6px 18px rgba(0,0,0,0.18); z-index: 90; max-width: 92%; text-align:center;
    opacity: 0; pointer-events:none; transition: opacity .15s; display:flex; align-items:center; gap:12px;
  }
  .hva-toast.show { opacity: 1; pointer-events:auto; }
  .hva-toast.error { background: var(--danger); }
  .hva-toast button { background:none; border:none; color:#8FC1FF; font-weight:700; cursor:pointer; font-size:12.5px; padding:0; }
  .hva-loading { display:flex; align-items:center; justify-content:center; padding: 60px 0; color: var(--text-soft); font-size: 13px; }

  .hva-modal-backdrop {
    position: fixed; inset:0; background: rgba(16,24,40,.45); z-index: 80;
    display:none; align-items:center; justify-content:center; padding: 20px;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .hva-modal-backdrop.open { display:flex; }
  .hva-modal {
    background:#fff; border-radius:14px; width: 560px; max-width: 100%; max-height: min(82vh, 640px);
    display:flex; flex-direction:column; box-shadow: 0 20px 50px rgba(16,24,40,.25); overflow:hidden;
  }
  .hva-modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .hva-modal-head .t { font-size:15px; font-weight:700; color:var(--text); }
  .hva-modal-body { padding: 14px 18px; overflow-y:auto; flex: 1 1 auto; min-height: 0; }
  .hva-modal-foot { padding: 12px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; flex-wrap:wrap; }
  .hva-modal-field { margin-bottom: 10px; }
  .hva-modal-field label { display:block; font-size: 11px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom:4px; }
  .hva-view-val {
    display:flex; align-items:flex-start; gap:8px; background:#F8F9FB; border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; font-size:13px; word-break: break-all; white-space: pre-wrap; color:var(--text);
  }
  .hva-view-val .v { flex:1; min-width:0; }
  .hva-view-val.empty .v { color:#B7BEC9; }
  .hva-hint { font-size:11px; color:var(--warn); background:var(--warn-tint); border-radius:6px; padding:6px 8px; margin-top:6px; display:none; }
  .hva-hint.show { display:block; }
</style>

<div id="hva-root">
  <div class="hva-header">
    <div>
      <div class="hva-title">HVA Content Intake</div>
      <div class="hva-subtitle">Content DE staging &middot; dynamic authoring variants</div>
    </div>
    <div class="hva-stats">
      <div class="hva-stat"><b id="stat-total">–</b>entries</div>
      <div class="hva-stat"><b id="stat-cats">–</b>categories</div>
      <div class="hva-stat"><b id="stat-updated">–</b>last activity</div>
    </div>
  </div>

  <div id="hva-character-wrap" style="display:flex;align-items:flex-end;justify-content:flex-start;gap:0;height:72px;margin-bottom:6px;padding-left:4px;pointer-events:none;user-select:none;">
    <svg id="hva-character" width="54" height="72" viewBox="0 0 54 72" style="overflow:visible;" aria-hidden="true">
      <defs>
        <style>
          #hva-character { animation: hva-bounce 1.6s ease-in-out infinite; transform-origin: bottom center; }
          @keyframes hva-bounce {
            0%,100% { transform: translateY(0px); }
            30%      { transform: translateY(-14px); }
            50%      { transform: translateY(-18px); }
            70%      { transform: translateY(-10px); }
          }
          #arm-l { transform-origin: 14px 32px; animation: hva-arm-l 1.6s ease-in-out infinite; }
          #arm-r { transform-origin: 40px 32px; animation: hva-arm-r 1.6s ease-in-out infinite; }
          @keyframes hva-arm-l {
            0%,100% { transform: rotate(0deg); }
            30%     { transform: rotate(-38deg); }
            50%     { transform: rotate(-50deg); }
            70%     { transform: rotate(-28deg); }
          }
          @keyframes hva-arm-r {
            0%,100% { transform: rotate(0deg); }
            30%     { transform: rotate(32deg); }
            50%     { transform: rotate(44deg); }
            70%     { transform: rotate(22deg); }
          }
          #leg-l { transform-origin: 19px 54px; animation: hva-leg-l 1.6s ease-in-out infinite; }
          #leg-r { transform-origin: 35px 54px; animation: hva-leg-r 1.6s ease-in-out infinite; }
          @keyframes hva-leg-l {
            0%,100% { transform: rotate(0deg); }
            30%     { transform: rotate(-22deg); }
            50%     { transform: rotate(-28deg); }
            70%     { transform: rotate(-16deg); }
          }
          @keyframes hva-leg-r {
            0%,100% { transform: rotate(0deg); }
            30%     { transform: rotate(22deg); }
            50%     { transform: rotate(28deg); }
            70%     { transform: rotate(16deg); }
          }
        </style>
      </defs>
      <g id="hva-person">
        <circle cx="27" cy="13" r="11" fill="#F5C27A" />
        <circle cx="22.5" cy="11" r="1.8" fill="#3A2A1A" />
        <circle cx="31.5" cy="11" r="1.8" fill="#3A2A1A" />
        <path d="M22 16 Q27 20 32 16" stroke="#3A2A1A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <rect x="13" y="25" width="28" height="26" rx="7" fill="#0050AA" />
        <rect x="16" y="27" width="22" height="12" rx="3" fill="#EAF1FB" />
        <rect x="18" y="29" width="5" height="2" rx="1" fill="#0050AA" opacity="0.4"/>
        <rect x="18" y="32.5" width="8" height="2" rx="1" fill="#0050AA" opacity="0.25"/>
        <rect x="18" y="36" width="5" height="2" rx="1" fill="#0050AA" opacity="0.4"/>
        <rect x="25" y="29" width="2" height="5" rx="1" fill="#1D8A5E" />
        <rect x="29" y="27.5" width="2" height="6.5" rx="1" fill="#D1453B" />
        <rect x="33" y="30" width="2" height="4" rx="1" fill="#F59E42" />
        <g id="arm-l">
          <line x1="13" y1="29" x2="5" y2="40" stroke="#F5C27A" stroke-width="5.5" stroke-linecap="round"/>
          <circle cx="5" cy="40" r="3.5" fill="#F5C27A"/>
        </g>
        <g id="arm-r">
          <line x1="41" y1="29" x2="49" y2="36" stroke="#F5C27A" stroke-width="5.5" stroke-linecap="round"/>
          <circle cx="49" cy="36" r="3.5" fill="#F5C27A"/>
        </g>
        <g id="leg-l">
          <line x1="19" y1="51" x2="16" y2="65" stroke="#1A2D5A" stroke-width="6" stroke-linecap="round"/>
          <ellipse cx="14" cy="67" rx="5" ry="3" fill="#1A1F29"/>
        </g>
        <g id="leg-r">
          <line x1="35" y1="51" x2="38" y2="65" stroke="#1A2D5A" stroke-width="6" stroke-linecap="round"/>
          <ellipse cx="40" cy="67" rx="5" ry="3" fill="#1A1F29"/>
        </g>
      </g>
    </svg>
    <div style="padding-left:10px;padding-bottom:18px;display:flex;flex-direction:column;gap:2px;">
      <div id="hva-bubble" style="
        background:#0050AA;color:#fff;font-size:12px;font-weight:600;
        padding:6px 10px;border-radius:10px 10px 10px 2px;
        font-family:'DM Sans',system-ui,sans-serif;white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,80,170,.18);
      ">Fill in the row below &amp; hit Add entry &#8595;</div>
    </div>
  </div>

  <div class="hva-card">
    <div class="hva-form-row" id="hva-form-row"></div>
    <div class="hva-hint" id="dup-hint"></div>
    <div style="margin-top:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <button type="button" id="hva-add-btn" class="hva-btn hva-btn-primary">+ Add entry</button>
      <button type="button" id="hva-clear-btn" class="hva-btn hva-btn-secondary hva-btn-sm">Clear fields</button>
      <span style="font-size:11.5px;color:var(--text-soft)">Tip: press Enter in any field to submit</span>
    </div>
  </div>

  <div class="hva-toolbar">
    <div class="hva-search" id="hva-search-wrap">
      <span class="icon">&#128269;</span>
      <input type="text" id="hva-search" class="hva-input" placeholder="Search all fields&hellip;">
      <button type="button" class="hva-icon-btn clear-x" id="hva-search-clear" title="Clear search">&#10005;</button>
    </div>
    <select class="hva-select" id="hva-category-filter"></select>
    <div class="hva-menu-wrap">
      <button type="button" class="hva-btn hva-btn-secondary" id="btn-export-menu">&#8681; Export &#9662;</button>
      <div class="hva-menu" id="export-menu">
        <div class="menu-label">Excel (.xlsx)</div>
        <button type="button" data-export="selected-xlsx">Selected rows</button>
        <button type="button" data-export="filtered-xlsx">Filtered view</button>
        <button type="button" data-export="all-xlsx">All entries</button>
        <hr>
        <div class="menu-label">CSV (DE import)</div>
        <button type="button" data-export="filtered-csv">Filtered view &rarr; CSV</button>
        <button type="button" data-export="all-csv">All entries &rarr; CSV</button>
        <hr>
        <button type="button" data-export="backup-json">Backup all data (.json)</button>
      </div>
    </div>
    <div class="hva-menu-wrap">
      <button type="button" class="hva-btn hva-btn-secondary" id="btn-data-menu">&#8942; Data</button>
      <div class="hva-menu" id="data-menu">
        <button type="button" id="btn-import">Import from Excel / CSV&hellip;</button>
        <button type="button" id="btn-restore">Restore from backup (.json)&hellip;</button>
        <hr>
        <button type="button" class="danger" id="btn-clear-all">Delete all entries&hellip;</button>
      </div>
    </div>
    <input type="file" id="file-import" accept=".xlsx,.xls,.csv" style="display:none">
    <input type="file" id="file-restore" accept=".json" style="display:none">
  </div>

  <div class="hva-bulkbar" id="bulkbar">
    <span><b id="bulk-count">0</b> selected</span>
    <button type="button" class="hva-btn hva-btn-secondary hva-btn-sm" id="bulk-export">&#8681; Export selected</button>
    <button type="button" class="hva-btn hva-btn-danger-soft hva-btn-sm" id="bulk-delete">&#128465; Delete selected</button>
    <span class="spacer"></span>
    <button type="button" class="hva-btn hva-btn-secondary hva-btn-sm" id="bulk-clear">Clear selection</button>
  </div>

  <div class="hva-table-wrap">
    <div id="hva-table-container"></div>
  </div>
</div>

<div class="hva-toast" id="hva-toast"><span id="toast-msg"></span><button type="button" id="toast-action" style="display:none"></button></div>

<div class="hva-modal-backdrop" id="modal-backdrop">
  <div class="hva-modal">
    <div class="hva-modal-head">
      <span class="t" id="modal-title">Entry</span>
      <button type="button" class="hva-icon-btn" id="modal-close">&#10005;</button>
    </div>
    <div class="hva-modal-body" id="modal-body"></div>
    <div class="hva-modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
(function () {
  var STORAGE_KEY = "hva-entries";
  var FIELDS = [
    { key: "category", label: "HVA Category", de: "HVA_CATEGORY", mono: false, width: 150, required: true },
    { key: "variantId", label: "Variant ID", de: "VARIANT_ID", mono: true, width: 130, required: true },
    { key: "text1", label: "TEXT1", de: "TEXT1", mono: false, width: 160 },
    { key: "text2", label: "TEXT2", de: "TEXT2", mono: false, width: 160 },
    { key: "url1", label: "URL_1", de: "URL_1", mono: true, width: 170, isUrl: true },
    { key: "url2", label: "URL_2", de: "URL_2", mono: true, width: 170, isUrl: true },
    { key: "image1", label: "IMAGE_1", de: "IMAGE_1", mono: true, width: 170, isUrl: true },
    { key: "image2", label: "IMAGE_2", de: "IMAGE_2", mono: true, width: 170, isUrl: true },
    { key: "deeplink", label: "DEEPLINK", de: "DEEPLINK", mono: true, width: 170 },
    { key: "buttonCta", label: "BUTTON_CTA", de: "BUTTON_CTA", mono: false, width: 150 },
  ];

  var entries = [];
  var selected = {};
  var loading = true;
  var sortKey = null;      // null = newest first
  var sortDir = 1;
  var lastDeleted = null;  // for undo

  /* ---------- helpers ---------- */
  function uid() { return Date.now() + "-" + Math.random().toString(36).slice(2, 9); }
  function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
  function $(id) { return document.getElementById(id); }

  function highlight(val, q) {
    if (!q) return esc(val);
    var lower = String(val).toLowerCase(), ql = q.toLowerCase(), out = "", i = 0;
    while (true) {
      var idx = lower.indexOf(ql, i);
      if (idx === -1) { out += esc(String(val).slice(i)); break; }
      out += esc(String(val).slice(i, idx)) + "<mark>" + esc(String(val).slice(idx, idx + q.length)) + "</mark>";
      i = idx + q.length;
    }
    return out;
  }

  function relTime(iso) {
    if (!iso) return "–";
    var s = (Date.now() - new Date(iso).getTime()) / 1000;
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s / 60) + "m ago";
    if (s < 86400) return Math.floor(s / 3600) + "h ago";
    if (s < 86400 * 30) return Math.floor(s / 86400) + "d ago";
    return new Date(iso).toLocaleDateString();
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ showToast("Copied to clipboard"); }, function(){ fallbackCopy(text); });
    } else fallbackCopy(text);
  }
  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); showToast("Copied to clipboard"); } catch(e) { showToast("Couldn't copy", "error"); }
    document.body.removeChild(ta);
  }

  /* ---------- toast (with optional action) ---------- */
  function showToast(message, kind, actionLabel, actionFn) {
    var t = $("hva-toast");
    $("toast-msg").textContent = message;
    var btn = $("toast-action");
    if (actionLabel) {
      btn.style.display = "inline";
      btn.textContent = actionLabel;
      btn.onclick = function () { hideToast(); if (actionFn) actionFn(); };
    } else { btn.style.display = "none"; btn.onclick = null; }
    t.className = "hva-toast show" + (kind === "error" ? " error" : "");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(hideToast, kind === "error" ? 6000 : (actionLabel ? 6000 : 2600));
  }
  function hideToast() { $("hva-toast").className = "hva-toast"; }

  /* ---------- storage ---------- */
  async function loadEntries() {
    try {
      if (typeof window.storage === "undefined") {
        entries = [];
        showToast("Storage unavailable — session-only mode (publish the artifact to persist data)", "error");
      } else {
        var res = await window.storage.get(STORAGE_KEY, false);
        entries = res ? JSON.parse(res.value) : [];
      }
    } catch (e) { entries = []; }
    entries.forEach(function (e) { if (!e.createdAt) e.createdAt = e.submittedAt || new Date().toISOString(); });
    loading = false;
    render();
  }
  async function persist() {
    if (typeof window.storage === "undefined") return;
    try {
      var r = await window.storage.set(STORAGE_KEY, JSON.stringify(entries), false);
      if (!r) throw new Error("write failed");
    } catch (e) { showToast("Couldn't save to storage — data kept in this session only", "error"); }
  }

  /* ---------- entry form ---------- */
  function buildForm() {
    var html = "";
    FIELDS.forEach(function (f) {
      html += '<div class="hva-field" style="width:' + f.width + 'px">' +
        '<label>' + f.label + (f.required ? '<span class="req"> *</span>' : '') + '</label>' +
        '<input type="text" data-field="' + f.key + '" class="hva-input ' + (f.mono ? "hva-mono" : "") + '" placeholder="' + f.label + '">' +
        '<span class="hva-field-error" data-error-for="' + f.key + '">Required</span>' +
        '</div>';
    });
    $("hva-form-row").innerHTML = html;
  }

  function getFormValues() {
    var vals = {};
    FIELDS.forEach(function (f) {
      var input = document.querySelector('#hva-form-row input[data-field="' + f.key + '"]');
      vals[f.key] = input ? input.value.trim() : "";
    });
    return vals;
  }
  function clearForm() {
    FIELDS.forEach(function (f) {
      var input = document.querySelector('#hva-form-row input[data-field="' + f.key + '"]');
      if (input) { input.value = ""; input.classList.remove("err"); }
      var err = document.querySelector('.hva-field-error[data-error-for="' + f.key + '"]');
      if (err) err.classList.remove("show");
    });
    $("dup-hint").className = "hva-hint";
  }

  function checkDuplicateHint() {
    var v = (document.querySelector('#hva-form-row input[data-field="variantId"]') || {}).value || "";
    v = v.trim();
    var hint = $("dup-hint");
    if (v && entries.some(function (e) { return (e.variantId || "").toLowerCase() === v.toLowerCase(); })) {
      hint.textContent = "\u26A0 Variant ID \"" + v + "\" already exists — adding will create a duplicate.";
      hint.className = "hva-hint show";
    } else hint.className = "hva-hint";
  }

  function handleAdd() {
    var vals = getFormValues();
    var missing = FIELDS.filter(function (f) { return f.required && !vals[f.key]; });
    FIELDS.forEach(function (f) {
      var input = document.querySelector('#hva-form-row input[data-field="' + f.key + '"]');
      var err = document.querySelector('.hva-field-error[data-error-for="' + f.key + '"]');
      var bad = f.required && !vals[f.key];
      if (input) input.classList.toggle("err", bad);
      if (err) err.classList.toggle("show", bad);
    });
    if (missing.length) {
      showToast("Category and Variant ID are required", "error");
      var fi = document.querySelector('#hva-form-row input[data-field="' + missing[0].key + '"]');
      if (fi) fi.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      return;
    }
    var isDup = entries.some(function (e) { return (e.variantId || "").toLowerCase() === vals.variantId.toLowerCase(); });
    if (isDup) {
      openConfirm("Duplicate Variant ID", 'An entry with Variant ID "' + esc(vals.variantId) + '" already exists. Add anyway?', "Add anyway", function () { commitAdd(vals); });
      return;
    }
    commitAdd(vals);
  }
  function commitAdd(vals) {
    var entry = { id: uid(), createdAt: new Date().toISOString() };
    FIELDS.forEach(function (f) { entry[f.key] = vals[f.key]; });
    entries.unshift(entry);
    clearForm();
    render();
    characterSay("&#127881; Entry added! Nice work &#8595;", 3000);
    persist().then(function () { showToast("Entry added"); });
    var first = document.querySelector('#hva-form-row input[data-field="category"]');
    if (first) first.focus();
  }

  /* ---------- delete / undo / bulk ---------- */
  function deleteEntries(ids, label) {
    var removed = [];
    entries = entries.filter(function (e) {
      if (ids.indexOf(e.id) !== -1) { removed.push(e); return false; }
      return true;
    });
    ids.forEach(function (id) { delete selected[id]; });
    lastDeleted = removed;
    render();
    persist();
    showToast((label || removed.length + " entr" + (removed.length === 1 ? "y" : "ies") + " deleted"), null, "Undo", undoDelete);
  }
  function undoDelete() {
    if (!lastDeleted || !lastDeleted.length) return;
    entries = lastDeleted.concat(entries);
    lastDeleted = null;
    render();
    persist();
    showToast("Restored");
  }

  /* ---------- filtering / sorting ---------- */
  function getQuery() { return ($("hva-search").value || "").trim(); }
  function getFiltered() {
    var q = getQuery().toLowerCase();
    var cat = $("hva-category-filter").value || "All";
    var list = entries.filter(function (e) {
      if (cat !== "All" && e.category !== cat) return false;
      if (!q) return true;
      return FIELDS.some(function (f) { return (e[f.key] || "").toLowerCase().indexOf(q) !== -1; });
    });
    if (sortKey) {
      list = list.slice().sort(function (a, b) {
        var av = (sortKey === "createdAt" ? (a.createdAt || "") : (a[sortKey] || "")).toLowerCase();
        var bv = (sortKey === "createdAt" ? (b.createdAt || "") : (b[sortKey] || "")).toLowerCase();
        if (av < bv) return -1 * sortDir;
        if (av > bv) return 1 * sortDir;
        return 0;
      });
    }
    return list;
  }

  function getCategories() {
    var set = {};
    entries.forEach(function (e) { if (e.category) set[e.category] = true; });
    return Object.keys(set).sort();
  }

  /* ---------- rendering ---------- */
  function renderStats() {
    $("stat-total").textContent = entries.length;
    $("stat-cats").textContent = getCategories().length;
    var latest = entries.reduce(function (m, e) {
      var t = e.updatedAt || e.createdAt;
      return (!m || (t && t > m)) ? t : m;
    }, null);
    $("stat-updated").textContent = relTime(latest);
  }

  function renderCategoryFilter() {
    var sel = $("hva-category-filter");
    var current = sel.value || "All";
    var cats = ["All"].concat(getCategories());
    sel.innerHTML = cats.map(function (c) {
      return '<option value="' + esc(c) + '">' + (c === "All" ? "All categories" : esc(c)) + '</option>';
    }).join("");
    sel.value = cats.indexOf(current) !== -1 ? current : "All";
  }

  function sortIndicator(key) {
    if (sortKey !== key) return "";
    return sortDir === 1 ? " \u25B2" : " \u25BC";
  }

  function renderTable() {
    var filtered = getFiltered();
    var q = getQuery();
    var container = $("hva-table-container");

    if (!filtered.length) {
      container.innerHTML = '<div class="hva-empty">' +
        (entries.length === 0
          ? '<div>No entries yet — add your first row above,<br>or import existing rows from Excel / CSV via the <b>Data</b> menu.</div>'
          : '<div>No entries match this search or filter.</div><button type="button" class="hva-btn hva-btn-secondary hva-btn-sm" id="empty-clear-filters">Clear search &amp; filters</button>') +
        '</div>';
      var ec = $("empty-clear-filters");
      if (ec) ec.addEventListener("click", function () {
        $("hva-search").value = ""; $("hva-category-filter").value = "All";
        $("hva-search-wrap").classList.remove("has-q"); renderTable();
      });
      updateBulkUI(filtered);
      return;
    }

    var visibleSel = filtered.filter(function (e) { return selected[e.id]; }).length;
    var allSel = visibleSel === filtered.length;

    var head = '<tr>' +
      '<th class="hva-checkbox-cell" data-action="toggle-all" title="Select all in view" style="cursor:pointer">' + (allSel ? "&#9745;" : "&#9744;") + '</th>' +
      FIELDS.map(function (f) { return '<th class="sortable" data-sort="' + f.key + '">' + esc(f.label) + sortIndicator(f.key) + '</th>'; }).join("") +
      '<th class="sortable" data-sort="createdAt">Submitted' + sortIndicator("createdAt") + '</th><th>Actions</th></tr>';

    var rows = filtered.map(function (e) {
      var isSel = !!selected[e.id];
      var cells = FIELDS.map(function (f) {
        var val = e[f.key] || "";
        var content = (f.key === "category" && val)
          ? '<span class="hva-cat-pill">' + highlight(val, q) + '</span>'
          : (val ? highlight(val, q) : "—");
        return '<td class="' + (f.mono ? "hva-mono" : "") + '" title="' + esc(val) + '">' + content + '</td>';
      }).join("");
      var dateStr = e.createdAt ? new Date(e.createdAt).toLocaleDateString() : "—";
      return '<tr class="' + (isSel ? "is-selected" : "") + '" data-row-id="' + e.id + '">' +
        '<td class="hva-checkbox-cell" data-action="toggle-row" data-id="' + e.id + '">' + (isSel ? "&#9745;" : "&#9744;") + '</td>' +
        cells +
        '<td title="' + esc(e.createdAt || "") + '">' + dateStr + (e.updatedAt ? ' <span style="color:var(--text-soft)">(edited)</span>' : '') + '</td>' +
        '<td class="hva-actions-cell">' +
          '<button type="button" class="hva-action-link" data-action="edit" data-id="' + e.id + '">Edit</button>' +
          '<button type="button" class="hva-action-link" data-action="duplicate" data-id="' + e.id + '">Duplicate</button>' +
          '<button type="button" class="hva-action-link danger" data-action="delete" data-id="' + e.id + '">Delete</button>' +
        '</td></tr>';
    }).join("");

    container.innerHTML = '<table class="hva-table"><thead>' + head + '</thead><tbody>' + rows + '</tbody></table>';
    updateBulkUI(filtered);
  }

  function updateBulkUI(filtered) {
    var count = Object.keys(selected).filter(function (id) { return selected[id]; }).length;
    $("bulkbar").classList.toggle("show", count > 0);
    $("bulk-count").textContent = count;
  }

  function characterSay(msg, durationMs) {
    var bubble = document.getElementById("hva-bubble");
    if (!bubble) return;
    bubble.innerHTML = msg;
    if (durationMs) {
      clearTimeout(characterSay._t);
      characterSay._t = setTimeout(function () {
        bubble.innerHTML = entries.length === 0
          ? "Fill in the row above &amp; hit Add entry &#8595;"
          : "Great! Add another or search below &#8595;";
      }, durationMs);
    }
  }

  function updateCharacter() {
    if (entries.length === 0) characterSay("Fill in the row below &amp; hit Add entry &#8595;");
    else characterSay("Great! Add another or search below &#8595;");
  }

  function render() {
    if (loading) { $("hva-table-container").innerHTML = '<div class="hva-loading">Loading saved entries…</div>'; return; }
    renderStats();
    renderCategoryFilter();
    renderTable();
    updateCharacter();
  }

  /* ---------- modals ---------- */
  function openModal(title, bodyHtml, footHtml) {
    $("modal-title").textContent = title;
    $("modal-body").innerHTML = bodyHtml;
    $("modal-foot").innerHTML = footHtml || "";
    $("modal-backdrop").classList.add("open");
  }
  function closeModal() { $("modal-backdrop").classList.remove("open"); }

  function openConfirm(title, msgHtml, confirmLabel, onConfirm, danger) {
    openModal(title,
      '<div style="font-size:13.5px;line-height:1.5;color:var(--text)">' + msgHtml + '</div>',
      '<button type="button" class="hva-btn hva-btn-secondary" id="cf-cancel">Cancel</button>' +
      '<button type="button" class="hva-btn ' + (danger ? "hva-btn-danger" : "hva-btn-primary") + '" id="cf-ok">' + esc(confirmLabel) + '</button>');
    $("cf-cancel").addEventListener("click", closeModal);
    $("cf-ok").addEventListener("click", function () { closeModal(); onConfirm(); });
  }

  function openView(entry) {
    var body = FIELDS.map(function (f) {
      var val = entry[f.key] || "";
      return '<div class="hva-modal-field"><label>' + f.label + '</label>' +
        '<div class="hva-view-val' + (val ? "" : " empty") + '">' +
        '<span class="v ' + (f.mono ? "hva-mono" : "") + '">' + (esc(val) || "(empty)") + '</span>' +
        (val ? '<button type="button" class="hva-icon-btn" data-copy="' + esc(val) + '" title="Copy">&#128203;</button>' : '') +
        '</div></div>';
    }).join("") +
    '<div class="hva-modal-field"><label>Submitted</label><div class="hva-view-val"><span class="v">' +
      esc(entry.createdAt ? new Date(entry.createdAt).toLocaleString() : "—") +
      (entry.updatedAt ? " &middot; edited " + esc(new Date(entry.updatedAt).toLocaleString()) : "") + '</span></div></div>';

    openModal("Entry detail", body,
      '<button type="button" class="hva-btn hva-btn-danger-soft" id="view-delete">Delete</button>' +
      '<button type="button" class="hva-btn hva-btn-secondary" id="view-edit">Edit</button>' +
      '<button type="button" class="hva-btn hva-btn-primary" id="view-close">Close</button>');

    $("modal-body").querySelectorAll("[data-copy]").forEach(function (b) {
      b.addEventListener("click", function () { copyText(b.getAttribute("data-copy")); });
    });
    $("view-close").addEventListener("click", closeModal);
    $("view-edit").addEventListener("click", function () { openEdit(entry.id); });
    $("view-delete").addEventListener("click", function () {
      closeModal();
      deleteEntries([entry.id]);
    });
  }

  function openEdit(id) {
    var entry = entries.find(function (e) { return e.id === id; });
    if (!entry) return;
    var body = FIELDS.map(function (f) {
      return '<div class="hva-modal-field"><label>' + f.label + (f.required ? ' <span style="color:var(--danger)">*</span>' : '') + '</label>' +
        '<input type="text" class="hva-input ' + (f.mono ? "hva-mono" : "") + '" data-edit-field="' + f.key + '" value="' + esc(entry[f.key] || "") + '"></div>';
    }).join("");
    openModal("Edit entry", body,
      '<button type="button" class="hva-btn hva-btn-secondary" id="edit-cancel">Cancel</button>' +
      '<button type="button" class="hva-btn hva-btn-primary" id="edit-save">Save changes</button>');
    $("edit-cancel").addEventListener("click", closeModal);
    $("edit-save").addEventListener("click", function () {
      var vals = {};
      FIELDS.forEach(function (f) {
        var inp = document.querySelector('[data-edit-field="' + f.key + '"]');
        vals[f.key] = inp ? inp.value.trim() : "";
      });
      if (!vals.category || !vals.variantId) { showToast("Category and Variant ID are required", "error"); return; }
      FIELDS.forEach(function (f) { entry[f.key] = vals[f.key]; });
      entry.updatedAt = new Date().toISOString();
      closeModal();
      render();
      persist().then(function () { showToast("Changes saved"); });
    });
  }

  function duplicateEntry(id) {
    var src = entries.find(function (e) { return e.id === id; });
    if (!src) return;
    var copy = { id: uid(), createdAt: new Date().toISOString() };
    FIELDS.forEach(function (f) { copy[f.key] = src[f.key] || ""; });
    copy.variantId = (copy.variantId || "") + "_COPY";
    entries.unshift(copy);
    render();
    persist();
    showToast("Duplicated — opened for editing");
    openEdit(copy.id);
  }

  /* ---------- export ---------- */
  function buildRows(rows) {
    return rows.map(function (e) {
      var row = {};
      FIELDS.forEach(function (f) { row[f.de] = e[f.key] || ""; });
      row["SUBMITTED_AT"] = e.createdAt ? new Date(e.createdAt).toLocaleString() : "";
      return row;
    });
  }
  function exportXlsx(rows, suffix) {
    if (!guardRows(rows)) return;
    var ws = XLSX.utils.json_to_sheet(buildRows(rows));
    ws["!cols"] = FIELDS.map(function (f) { return { wch: Math.max(12, Math.round(f.width / 7)) }; }).concat([{ wch: 18 }]);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "HVA Entries");
    XLSX.writeFile(wb, "hva-entries-" + suffix + "-" + stamp() + ".xlsx");
    showToast("Exported " + rows.length + " row" + (rows.length === 1 ? "" : "s") + " (.xlsx)");
  }
  function exportCsv(rows, suffix) {
    if (!guardRows(rows)) return;
    var ws = XLSX.utils.json_to_sheet(buildRows(rows));
    var csv = XLSX.utils.sheet_to_csv(ws);
    downloadBlob(csv, "hva-entries-" + suffix + "-" + stamp() + ".csv", "text/csv");
    showToast("Exported " + rows.length + " row" + (rows.length === 1 ? "" : "s") + " (.csv)");
  }
  function exportBackup() {
    downloadBlob(JSON.stringify(entries, null, 2), "hva-backup-" + stamp() + ".json", "application/json");
    showToast("Backup downloaded (" + entries.length + " entries)");
  }
  function guardRows(rows) {
    if (!rows || !rows.length) { showToast("No rows to export", "error"); return false; }
    if (typeof XLSX === "undefined") { showToast("Export library failed to load — refresh and retry", "error"); return false; }
    return true;
  }
  function stamp() { return new Date().toISOString().slice(0, 10); }
  function downloadBlob(content, filename, type) {
    var blob = new Blob([content], { type: type });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 500);
  }
  function selectedRows() { return entries.filter(function (e) { return selected[e.id]; }); }

  /* ---------- import ---------- */
  var HEADER_MAP = {};
  FIELDS.forEach(function (f) {
    [f.key, f.label, f.de].forEach(function (h) { HEADER_MAP[h.toLowerCase().replace(/[^a-z0-9]/g, "")] = f.key; });
  });
  function handleImportFile(file) {
    if (typeof XLSX === "undefined") { showToast("Import library failed to load — refresh and retry", "error"); return; }
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        var wb = XLSX.read(ev.target.result, { type: "array" });
        var ws = wb.Sheets[wb.SheetNames[0]];
        var raw = XLSX.utils.sheet_to_json(ws, { defval: "" });
        var added = 0, skipped = 0;
        raw.forEach(function (r) {
          var entry = { id: uid(), createdAt: new Date().toISOString() };
          Object.keys(r).forEach(function (h) {
            var key = HEADER_MAP[String(h).toLowerCase().replace(/[^a-z0-9]/g, "")];
            if (key) entry[key] = String(r[h]).trim();
          });
          if (entry.category && entry.variantId) { entries.unshift(entry); added++; }
          else skipped++;
        });
        render();
        persist();
        showToast("Imported " + added + " row" + (added === 1 ? "" : "s") + (skipped ? " · skipped " + skipped + " (missing required fields)" : ""));
      } catch (e) {
        showToast("Couldn't read that file — expected .xlsx or .csv with header row", "error");
      }
    };
    reader.readAsArrayBuffer(file);
  }
  function handleRestoreFile(file) {
    var reader = new FileReader();
    reader.onload = function (ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error("bad format");
        openConfirm("Restore backup", "Replace all current entries (" + entries.length + ") with the " + data.length + " entries in this backup?", "Replace", function () {
          entries = data;
          selected = {};
          render();
          persist();
          showToast("Backup restored (" + entries.length + " entries)");
        }, true);
      } catch (e) { showToast("That doesn't look like a valid backup file", "error"); }
    };
    reader.readAsText(file);
  }

  /* ---------- menus ---------- */
  function toggleMenu(id) {
    var m = $(id);
    var open = m.classList.contains("open");
    closeMenus();
    if (!open) m.classList.add("open");
  }
  function closeMenus() {
    document.querySelectorAll(".hva-menu.open").forEach(function (m) { m.classList.remove("open"); });
  }

  /* ---------- init ---------- */
  function init() {
    buildForm();

    $("hva-add-btn").addEventListener("click", handleAdd);
    $("hva-clear-btn").addEventListener("click", clearForm);
    $("hva-form-row").addEventListener("keydown", function (ev) {
      if (ev.key === "Enter" && ev.target.tagName === "INPUT") handleAdd();
    });
    $("hva-form-row").addEventListener("input", function (ev) {
      if (ev.target.getAttribute("data-field") === "variantId") checkDuplicateHint();
    });

    $("hva-search").addEventListener("input", function () {
      $("hva-search-wrap").classList.toggle("has-q", !!getQuery());
      renderTable();
    });
    $("hva-search-clear").addEventListener("click", function () {
      $("hva-search").value = "";
      $("hva-search-wrap").classList.remove("has-q");
      renderTable();
      $("hva-search").focus();
    });
    $("hva-category-filter").addEventListener("change", renderTable);

    $("btn-export-menu").addEventListener("click", function (ev) { ev.stopPropagation(); toggleMenu("export-menu"); });
    $("btn-data-menu").addEventListener("click", function (ev) { ev.stopPropagation(); toggleMenu("data-menu"); });
    document.addEventListener("click", closeMenus);

    $("export-menu").addEventListener("click", function (ev) {
      var b = ev.target.closest("[data-export]");
      if (!b) return;
      closeMenus();
      var kind = b.getAttribute("data-export");
      if (kind === "selected-xlsx") exportXlsx(selectedRows(), "selected");
      else if (kind === "filtered-xlsx") exportXlsx(getFiltered(), "filtered");
      else if (kind === "all-xlsx") exportXlsx(entries, "all");
      else if (kind === "filtered-csv") exportCsv(getFiltered(), "filtered");
      else if (kind === "all-csv") exportCsv(entries, "all");
      else if (kind === "backup-json") exportBackup();
    });

    $("btn-import").addEventListener("click", function () { closeMenus(); $("file-import").click(); });
    $("file-import").addEventListener("change", function (ev) {
      if (ev.target.files && ev.target.files[0]) handleImportFile(ev.target.files[0]);
      ev.target.value = "";
    });
    $("btn-restore").addEventListener("click", function () { closeMenus(); $("file-restore").click(); });
    $("file-restore").addEventListener("change", function (ev) {
      if (ev.target.files && ev.target.files[0]) handleRestoreFile(ev.target.files[0]);
      ev.target.value = "";
    });
    $("btn-clear-all").addEventListener("click", function () {
      closeMenus();
      if (!entries.length) { showToast("Nothing to delete"); return; }
      openConfirm("Delete all entries", "This will permanently delete all <b>" + entries.length + "</b> entries. Consider downloading a backup first (Export &rarr; Backup all data).", "Delete everything", function () {
        deleteEntries(entries.map(function (e) { return e.id; }), "All entries deleted");
      }, true);
    });

    $("bulk-delete").addEventListener("click", function () {
      var ids = Object.keys(selected).filter(function (id) { return selected[id]; });
      if (!ids.length) return;
      openConfirm("Delete selected", "Delete <b>" + ids.length + "</b> selected entr" + (ids.length === 1 ? "y" : "ies") + "?", "Delete", function () { deleteEntries(ids); }, true);
    });
    $("bulk-export").addEventListener("click", function () { exportXlsx(selectedRows(), "selected"); });
    $("bulk-clear").addEventListener("click", function () { selected = {}; renderTable(); });

    $("modal-close").addEventListener("click", closeModal);
    $("modal-backdrop").addEventListener("click", function (ev) { if (ev.target === $("modal-backdrop")) closeModal(); });
    document.addEventListener("keydown", function (ev) { if (ev.key === "Escape") { closeModal(); closeMenus(); } });

    $("hva-table-container").addEventListener("click", function (ev) {
      var t = ev.target;
      var actEl = t.closest("[data-action]");
      if (actEl) {
        var action = actEl.getAttribute("data-action");
        var id = actEl.getAttribute("data-id");
        if (action === "toggle-row") { selected[id] = !selected[id]; renderTable(); return; }
        if (action === "toggle-all") {
          var filtered = getFiltered();
          var allSel = filtered.length && filtered.every(function (e) { return selected[e.id]; });
          filtered.forEach(function (e) { selected[e.id] = !allSel; });
          renderTable(); return;
        }
        if (action === "edit") { openEdit(id); return; }
        if (action === "duplicate") { duplicateEntry(id); return; }
        if (action === "delete") { deleteEntries([id]); return; }
      }
      var sortEl = t.closest("[data-sort]");
      if (sortEl) {
        var key = sortEl.getAttribute("data-sort");
        if (sortKey === key) { sortDir = -sortDir; if (sortDir === 1 && key === sortKey) { } }
        else { sortKey = key; sortDir = 1; }
        renderTable(); return;
      }
      var rowEl = t.closest("tr[data-row-id]");
      if (rowEl) {
        var entry = entries.find(function (e) { return e.id === rowEl.getAttribute("data-row-id"); });
        if (entry) openView(entry);
      }
    });

    loadEntries();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();
</script>
